<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lowkey | Iniciar sesión</title>
  <link rel="stylesheet" href="../assets/styles/logstyle.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">LK</div>

      <p class="eyebrow">Lowkey</p>
      <h1>Iniciar sesión</h1>
      <p class="subtitle">
        Accede a la gestión integral de tus vehículos.
      </p>

      <form id="loginForm">
        <label>
          Usuario
          <input
            type="text"
            id="username"
            placeholder="••••••••"
            required
          />
        </label>

        <label>
          Contraseña
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </label>

        <button type="submit">Entrar</button>

        <p id="errorMessage" class="error"></p>
      </form>

      <div class="demo-users">
        <p><strong>Usuarios de prueba</strong></p>
        <p>jose / admin</p>
        <p>joaquin / admin</p>
        <p>hector / admin</p>
      </div>

      <p class="auth-switch">
        ¿No tienes cuenta? <a class="auth-link" href="register.html">Crear cuenta</a>
      </p>
    </div>
  </div>

  <script src="../assets/logapp.js"></script>
</body>
</html>
