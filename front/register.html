<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lowkey | Crear cuenta</title>
  <link rel="stylesheet" href="assets/registrocss.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">LK</div>

      <p class="eyebrow">Lowkey</p>
      <h1>Crear cuenta</h1>
      <p class="subtitle">
        Regístrate para gestionar tus vehículos.
      </p>

      <form id="registerForm">
        <label>
          Nombre completo
          <input
            type="text"
            id="fullname"
            placeholder="Ej: Juan García"
            required
          />
        </label>

        <label>
          Usuario
          <input
            type="text"
            id="username"
            placeholder="Ej: juangarcia"
            autocomplete="username"
            required
          />
        </label>

        <label>
          Contraseña
          <input
            type="password"
            id="password"
            placeholder="Mínimo 4 caracteres"
            autocomplete="new-password"
            required
          />
        </label>

        <label>
          Confirmar contraseña
          <input
            type="password"
            id="passwordConfirm"
            placeholder="Repite la contraseña"
            autocomplete="new-password"
            required
          />
        </label>

        <button type="submit">Registrarse</button>

        <p id="errorMessage" class="error"></p>
        <p id="successMessage" class="success"></p>
      </form>

      <div class="divider">
        <span>¿Ya tienes cuenta?</span>
      </div>

      <a href="log.html" class="btn-secondary">Iniciar sesión</a>
    </div>
  </div>

  <script src="assets/registrojs.js"></script>
</body>
</html>
